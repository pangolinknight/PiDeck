<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#22c55e"/>
      <stop offset="1" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="shine" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop stop-color="rgba(255,255,255,0.25)" offset="0"/>
      <stop stop-color="rgba(255,255,255,0)" offset="0.5"/>
    </linearGradient>
  </defs>
  <!-- 圆角矩形背景 -->
  <rect width="1024" height="1024" rx="228" fill="url(#bg)"/>
  <!-- 顶部光泽 -->
  <rect width="1024" height="512" rx="228" fill="url(#shine)"/>
  <!-- 官方 pi wordmark，裁剪 viewBox 到 logo 实际边界后居中放大 -->
  <g transform="translate(160, 170) scale(1.4)">
    <svg viewBox="140 140 520 520" width="520" height="520">
      <!-- P shape: outer boundary clockwise, inner hole counter-clockwise -->
      <path fill="#fff" fill-rule="evenodd" d="
        M165.29 165.29
        H517.36
        V400
        H400
        V517.36
        H282.65
        V634.72
        H165.29
        Z
        M282.65 282.65
        V400
        H400
        V282.65
        Z
      "/>
      <!-- i dot -->
      <path fill="#fff" d="M517.36 400 H634.72 V634.72 H517.36 Z"/>
    </svg>
  </g>
  <!-- 右上角装饰圆点 -->
  <circle cx="860" cy="164" r="48" fill="rgba(255,255,255,0.15)"/>
</svg>
