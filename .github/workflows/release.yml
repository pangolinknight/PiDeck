name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    name: Build ${{ matrix.platform }} packages
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            command: npm run dist:win
          - platform: macos
            os: macos-latest
            command: npm run dist:mac
          - platform: linux
            os: ubuntu-latest
            command: npm run dist:linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate app icon
        run: npm run make-icon

      - name: Build packages
        run: ${{ matrix.command }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/*.msi
            release/*.zip
            release/*.dmg
            release/*.AppImage
            release/*.deb
            release/*.tar.gz
            release/*.blockmap
            release/latest*.yml
